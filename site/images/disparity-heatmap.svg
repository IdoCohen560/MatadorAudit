<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <filter id="hg"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <!-- Abstract grid of demographic data cells showing disparity -->
  <!-- Row 1 - high performing group -->
  <rect x="120" y="100" width="80" height="60" rx="8" fill="#22c55e" opacity="0.25"/>
  <rect x="220" y="100" width="80" height="60" rx="8" fill="#22c55e" opacity="0.22"/>
  <rect x="320" y="100" width="80" height="60" rx="8" fill="#22c55e" opacity="0.20"/>
  <rect x="420" y="100" width="80" height="60" rx="8" fill="#4ade80" opacity="0.18"/>
  <rect x="520" y="100" width="80" height="60" rx="8" fill="#22c55e" opacity="0.23"/>
  <rect x="620" y="100" width="80" height="60" rx="8" fill="#22c55e" opacity="0.21"/>

  <!-- Row 2 - medium -->
  <rect x="120" y="180" width="80" height="60" rx="8" fill="#22c55e" opacity="0.18"/>
  <rect x="220" y="180" width="80" height="60" rx="8" fill="#f59e0b" opacity="0.15"/>
  <rect x="320" y="180" width="80" height="60" rx="8" fill="#22c55e" opacity="0.17"/>
  <rect x="420" y="180" width="80" height="60" rx="8" fill="#f59e0b" opacity="0.18"/>
  <rect x="520" y="180" width="80" height="60" rx="8" fill="#22c55e" opacity="0.15"/>
  <rect x="620" y="180" width="80" height="60" rx="8" fill="#f59e0b" opacity="0.16"/>

  <!-- Row 3 - concerning -->
  <rect x="120" y="260" width="80" height="60" rx="8" fill="#f59e0b" opacity="0.18"/>
  <rect x="220" y="260" width="80" height="60" rx="8" fill="#f59e0b" opacity="0.20"/>
  <rect x="320" y="260" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.15"/>
  <rect x="420" y="260" width="80" height="60" rx="8" fill="#f59e0b" opacity="0.22"/>
  <rect x="520" y="260" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.18"/>
  <rect x="620" y="260" width="80" height="60" rx="8" fill="#f59e0b" opacity="0.20"/>

  <!-- Row 4 - high disparity -->
  <rect x="120" y="340" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.20"/>
  <rect x="220" y="340" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.25"/>
  <rect x="320" y="340" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.30"/>
  <rect x="420" y="340" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.22"/>
  <rect x="520" y="340" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.28"/>
  <rect x="620" y="340" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.18"/>

  <!-- Row 5 - severe -->
  <rect x="120" y="420" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.30"/>
  <rect x="220" y="420" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.35"/>
  <rect x="320" y="420" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.40"/>
  <rect x="420" y="420" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.32"/>
  <rect x="520" y="420" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.38"/>
  <rect x="620" y="420" width="80" height="60" rx="8" fill="#CF0A2C" opacity="0.28"/>

  <!-- Glow on hot spots -->
  <circle cx="360" cy="450" r="50" fill="#CF0A2C" opacity="0.08" filter="url(#hg)"/>
  <circle cx="560" cy="450" r="45" fill="#CF0A2C" opacity="0.07" filter="url(#hg)"/>
  <circle cx="260" cy="450" r="40" fill="#CF0A2C" opacity="0.06" filter="url(#hg)"/>

  <!-- Scan line effect -->
  <rect x="100" y="295" width="620" height="1" fill="#CF0A2C" opacity="0.3"/>
  <rect x="100" y="295" width="620" height="4" fill="#CF0A2C" opacity="0.05"/>
</svg>

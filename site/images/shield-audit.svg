<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="shield-grad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#CF0A2C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CF0A2C" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="shield-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#CF0A2C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#CF0A2C" stop-opacity="0"/>
    </radialGradient>
    <filter id="sg"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- Background glow -->
  <circle cx="400" cy="280" r="200" fill="url(#shield-glow)" filter="url(#sg)"/>

  <!-- Shield shape -->
  <path d="M400 120 L520 170 L520 310 Q520 420 400 480 Q280 420 280 310 L280 170 Z"
        fill="url(#shield-grad)" stroke="#CF0A2C" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Inner shield line -->
  <path d="M400 145 L500 185 L500 305 Q500 400 400 455 Q300 400 300 305 L300 185 Z"
        fill="none" stroke="#CF0A2C" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Checkmark inside shield -->
  <path d="M355 290 L385 320 L450 250" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Circling data points around shield -->
  <circle cx="250" cy="200" r="4" fill="#3b82f6" opacity="0.5"/>
  <circle cx="230" cy="280" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="250" cy="360" r="3.5" fill="#3b82f6" opacity="0.45"/>

  <circle cx="550" cy="200" r="4" fill="#f59e0b" opacity="0.5"/>
  <circle cx="570" cy="280" r="3" fill="#f59e0b" opacity="0.4"/>
  <circle cx="550" cy="360" r="3.5" fill="#f59e0b" opacity="0.45"/>

  <circle cx="400" cy="90" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="350" cy="510" r="2.5" fill="#22c55e" opacity="0.3"/>
  <circle cx="450" cy="510" r="2.5" fill="#22c55e" opacity="0.3"/>

  <!-- Connection lines to shield -->
  <line x1="250" y1="200" x2="300" y2="200" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
  <line x1="550" y1="200" x2="500" y2="200" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>
  <line x1="230" y1="280" x2="280" y2="280" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
  <line x1="570" y1="280" x2="520" y2="280" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>

  <!-- Scattered particles -->
  <circle cx="200" cy="150" r="1.5" fill="#CF0A2C" opacity="0.2"/>
  <circle cx="600" cy="150" r="1.5" fill="#CF0A2C" opacity="0.2"/>
  <circle cx="180" cy="400" r="1" fill="#22c55e" opacity="0.2"/>
  <circle cx="620" cy="400" r="1" fill="#22c55e" opacity="0.2"/>
  <circle cx="320" cy="100" r="1" fill="#8b5cf6" opacity="0.15"/>
  <circle cx="480" cy="100" r="1" fill="#8b5cf6" opacity="0.15"/>
</svg>
